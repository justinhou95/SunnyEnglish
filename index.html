<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>English Study</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 400px;
      margin: 40px auto;
      padding: 0 20px;
      background: #fff;
      color: #222;
    }
    h1 { font-size: 1.4rem; margin-bottom: 20px; }
    ul { list-style: none; padding: 0; margin: 0; }
    li { border-bottom: 1px solid #eee; }
    a {
      display: block;
      padding: 10px 4px;
      text-decoration: none;
      color: #222;
    }
    a:hover { background: #f9f9f9; }
    .sub {
      font-size: 0.8rem;
      color: #888;
      margin-left: 6px;
    }
  </style>
</head>
<body>
  <h1>English Study</h1>
  <ul id="list"></ul>

  <script>
    const list = document.getElementById("list");
    let num = 6;

    function loadNext() {
      const script = document.createElement("script");
      script.src = `data/lesson${num}.js`;
      script.onload = () => {
        const { title, words } = window.lessonData;
        const li = document.createElement("li");
        li.innerHTML = `<a href="lesson.html?lesson=${num}">${title} <span class="sub">${words.length} words</span></a>`;
        list.appendChild(li);
        num++;
        loadNext();
      };
      document.head.appendChild(script);
    }

    loadNext();
  </script>
</body>
</html>
